<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brad Wyatt | Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Source+Sans+3:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/assets/favicon/bwyatt22-36_cropped.png" />
    <link rel="stylesheet" href="/css/site.css" />
  </head>
  <body class="resume-page">
    <div class="page">
      <header class="hero">
        <div class="container hero-inner">
          <nav class="nav">
            <div class="brand">Brad Wyatt</div>
            <div class="nav-links">
              <a href="/" data-path="/">Home</a>
              <span>·</span>
              <a href="/resume/" data-path="/resume">Resume</a>
              <span>·</span>
              <a href="/projects/" data-path="/projects">Projects</a>
            </div>
          </nav>
          <div class="hero-title fade-in">Resume</div>
          <div class="hero-underline"></div>
        </div>
      </header>

      <main class="main">
        <section class="section">
          <div class="container resume-layout">
            <div class="panel resume-card resume-downloads fade-in">
              <div class="eyebrow">Downloads</div>
              <h2 class="section-title">Resume</h2>
              <p class="text-muted resume-intro">
                Choose the concise overview or the full version with detailed project and role history.
              </p>
              <div class="button-row">
                <a class="btn" target="_blank" rel="noopener noreferrer" href="/assets/resume/WyattResumeShort.pdf"
                  >Short Resume (1 Page)</a
                >
                <a class="btn" target="_blank" rel="noopener noreferrer" href="/assets/resume/WyattResumeLong.pdf"
                  >Master Resume (Full Version)</a
                >
              </div>
            </div>

            <div class="resume-trophies fade-in">
              <div class="eyebrow resume-section-label">Recognition</div>
              <div class="media-stack trophy-stack">
                <figure class="trophy trophy-guitar">
                  <div class="trophy-image-wrapper">
                    <img class="media" src="/assets/resume/OpenGovRockstarAward.jpg" alt="OpenGov Rockstar Award" />
                  </div>
                  <figcaption class="award-caption">
                    <div class="award-title">OpenGov Rockstar Award</div>
                    <div class="award-year">2022</div>
                  </figcaption>
                </figure>
                <figure class="trophy trophy-ps">
                  <div class="trophy-image-wrapper">
                    <img
                      class="media"
                      src="/assets/resume/2025_PS_Act_With_Urgency_Trophy_IMG_E04FFD3F-89E6-4BFA-8317-597875602123.jpeg"
                      alt="PS Act With Urgency Trophy"
                    />
                  </div>
                  <figcaption class="award-caption">
                    <div class="award-title">PS Act With Urgency Award</div>
                    <div class="award-year">2025</div>
                  </figcaption>
                </figure>
              </div>
            </div>

            <div class="resume-embed-shell fade-in">
              <div class="eyebrow">Full Resume</div>
              <div class="resume-embed-frame">
                <iframe
                  class="resume-viewer"
                  src="/assets/resume/WyattResumeLong.pdf"
                  title="Brad Wyatt Resume"
                  loading="lazy"
                ></iframe>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <span>© Brad Wyatt · San Francisco · Built with HTML, CSS, and GitHub Pages</span>
      </footer>
    </div>

    <script src="/js/site.js"></script>
  </body>
</html>
